<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="panel__header">
        <div>
          <h1>Snake</h1>
          <p class="panel__subtitle">Classic grid movement, food, score, restart.</p>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span class="scoreboard__label">Score</span>
          <strong id="score">0</strong>!
        </div>
      </header>

      <div class="status-row">
        <p id="status">Press an arrow key, WASD, or the controls below to begin.</p>
        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>
      </div>

      <div
        id="board"
        class="board"
        role="grid"
        aria-label="Snake game board"
      ></div>

      <section class="controls" aria-label="Touch controls">
        <button type="button" data-direction="UP" aria-label="Move up">Up</button>
        <div class="controls__middle">
          <button type="button" data-direction="LEFT" aria-label="Move left">Left</button>
          <button type="button" data-direction="DOWN" aria-label="Move down">Down</button>
          <button type="button" data-direction="RIGHT" aria-label="Move right">Right</button>
        </div>
      </section>

      <p class="help">Use arrow keys or WASD. Press Space to pause and R to restart.</p>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
